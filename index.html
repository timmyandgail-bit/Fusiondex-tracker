<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FusionDex Tracker — Infinite Fusion 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <h1>FusionDex<span class="brand-sub">Tracker</span></h1>
    </div>
    <div class="sync-block">
      <button id="connect-save" class="btn btn-primary">Connect Save</button>
      <p id="sync-status" class="sync-status">Save sync not connected.</p>
    </div>
  </header>

  <main>
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="caught-count">0</div>
        <div class="stat-label">Caught</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="seen-count">0</div>
        <div class="stat-label">Seen</div>
      </div>
      <div class="stat-card actions">
        <button id="export-btn" class="btn btn-ghost">Export</button>
        <button id="import-btn" class="btn btn-ghost">Import</button>
        <input id="import-input" type="file" accept="application/json" hidden>
        <button id="clear-progress" class="btn btn-ghost btn-danger">Clear</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="panel-title">Party</h2>
      <div id="party-list" class="pmon-grid empty-hint" data-empty="No party data yet — connect your save to sync."></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">PC Boxes</h2>
      <div id="box-list" class="pmon-grid empty-hint" data-empty="No box data yet — connect your save to sync."></div>
    </section>

    <footer class="note">
      Runs entirely in your browser. Your save file and progress never leave this device.
      Auto-sync requires Chrome or Edge (File System Access API).
    </footer>
  </main>

  <script src="assets/rmarshal.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
